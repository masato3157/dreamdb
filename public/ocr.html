<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワークシートOCR入力 — 夢分析DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .ocr-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
      margin: 16px 16px 0;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(107, 99, 246, 0.06);
    }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .upload-zone-label {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .upload-zone-hint {
      font-size: 12px;
      color: var(--text-muted, #666);
    }

    /* Image previews */
    .preview-row {
      display: flex;
      gap: 10px;
      padding: 12px 16px 0;
      flex-wrap: wrap;
    }
    .preview-item {
      position: relative;
      width: 120px;
      height: 160px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* OCR button area */
    .ocr-actions {
      padding: 16px 16px 0;
    }
    .btn-ocr {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-ocr:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ocr:hover:not(:disabled) { opacity: 0.88; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-ocr.loading .spinner { display: block; }
    .btn-ocr.loading .btn-ocr-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* OCR status message */
    .ocr-status {
      margin: 10px 16px 0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .ocr-status.success {
      background: rgba(52, 199, 89, 0.12);
      color: #34c759;
      border: 1px solid rgba(52, 199, 89, 0.25);
      display: block;
    }
    .ocr-status.error {
      background: rgba(255, 59, 48, 0.1);
      color: #ff3b30;
      border: 1px solid rgba(255, 59, 48, 0.2);
      display: block;
    }

    /* Form sections */
    .form-divider {
      margin: 24px 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .form-divider-label {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* Override form-section padding for this page */
    .ocr-page .form-section {
      margin: 0 16px;
      padding: 16px 0 0;
      border-top: none;
    }
    .ocr-page .dream-form {
      padding: 0;
    }
    .ocr-page .form-actions {
      margin: 24px 16px 0;
      padding: 0;
    }

    /* OCR fill highlight */
    .ocr-filled {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(107,99,246,0.15);
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    /* Page header */
    .ocr-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 0;
    }
    .ocr-header-back {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-family: var(--font-sans);
      padding: 0;
    }
    .ocr-header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-sans);
    }
  </style>
</head>
<body>

<div id="view-login" class="view hidden">
  <div class="login-noise"></div>
  <div class="login-inner">
    <div class="login-symbol">夢</div>
    <h1 class="login-title">大高式ドリームワーク</h1>
    <p class="login-subtitle">夢分析データベース</p>
    <button id="btn-google-login" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Googleでサインイン
    </button>
    <p class="login-note">アクセス権限のあるGoogleアカウントでサインインしてください</p>
  </div>
</div>

<div id="view-app" class="view hidden">
  <div class="ocr-page">

    <!-- Header -->
    <div class="ocr-header">
      <button class="ocr-header-back" onclick="location.href='/'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        一覧へ
      </button>
      <span class="ocr-header-title">ワークシートOCR入力</span>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" multiple>
      <div class="upload-zone-icon">📷</div>
      <div class="upload-zone-label">タップして撮影 または ライブラリから選択<br><small style="font-weight:400;font-size:13px;">PCはドラッグ＆ドロップも可</small></div>
      <div class="upload-zone-hint">スマホはカメラ直接撮影できます　複数枚まとめてOK（最大3枚・1枚15MBまで）</div>
    </div>

    <!-- Preview -->
    <div class="preview-row" id="preview-row"></div>

    <!-- OCR button -->
    <div class="ocr-actions">
      <button class="btn-ocr" id="btn-ocr" disabled>
        <div class="spinner"></div>
        <span class="btn-ocr-text">OCR実行 — 手書きを読み取る</span>
      </button>
    </div>
    <div class="ocr-status" id="ocr-status"></div>

    <!-- Form -->
    <form id="dream-form" class="dream-form" novalidate>

      <div class="form-divider">
        <div class="form-divider-line"></div>
        <div class="form-divider-label">手書き読取結果（修正可）</div>
        <div class="form-divider-line"></div>
      </div>

      <section class="form-section">
        <div class="field">
          <label class="label required" for="f-dream-content">夢の内容</label>
          <textarea id="f-dream-content" name="夢の内容" class="textarea" rows="6" placeholder="OCR実行後に自動入力されます" required></textarea>
        </div>
        <div class="field">
          <label class="label required" for="f-insight">ワーク中の気づき</label>
          <textarea id="f-insight" name="ワーク中の気づき" class="textarea" rows="4" placeholder="OCR実行後に自動入力されます" required></textarea>
        </div>
        <div class="field">
          <label class="label" for="f-change">後日談 <span class="optional">任意</span></label>
          <textarea id="f-change" name="後日談" class="textarea" rows="3" placeholder="後日談がワークシートに書かれている場合"></textarea>
        </div>
        <div class="field">
          <label class="label" for="f-memo">大高メモ <span class="optional">任意</span></label>
          <textarea id="f-memo" name="大高メモ" class="textarea" rows="3" placeholder="赤ペン等のコメント・注釈"></textarea>
        </div>
        <div class="field">
          <label class="label" for="f-dream-type">夢の分類 <span class="optional">任意</span></label>
          <select id="f-dream-type" name="夢の分類" class="select">
            <option value="">選択…</option>
            <option>悪夢</option><option>繰り返し夢</option><option>断片</option>
            <option>色のみ</option><option>音のみ</option><option>臭いのみ</option>
            <option>味覚のみ</option><option>触感のみ</option><option>感情のみ</option><option>その他</option>
          </select>
        </div>
      </section>

      <div class="form-divider">
        <div class="form-divider-line"></div>
        <div class="form-divider-label">夢主情報（手入力）</div>
        <div class="form-divider-line"></div>
      </div>

      <section class="form-section">
        <div class="field">
          <label class="label required" for="f-age">夢主年代</label>
          <select id="f-age" name="夢主年代" class="select" required>
            <option value="">選択…</option>
            <option>10代</option><option>20代</option><option>30代</option>
            <option>40代</option><option>50代</option><option>60代</option>
            <option>70代</option><option>80代以上</option>
          </select>
        </div>
        <div class="field">
          <label class="label required" for="f-gender">夢主性別</label>
          <select id="f-gender" name="夢主性別" class="select" required>
            <option value="">選択…</option>
            <option>男性</option><option>女性</option><option>不明</option>
          </select>
        </div>
        <div class="field">
          <label class="label required" for="f-situation">夢主の状況</label>
          <textarea id="f-situation" name="夢主の状況" class="textarea" rows="3" placeholder="セッション時の生活・心理状況" required></textarea>
        </div>
        <div class="field">
          <label class="label" for="f-worry">ワーク前に自覚していた悩み <span class="optional">任意</span></label>
          <select id="f-worry" name="ワーク前に自覚していた悩み" class="select">
            <option value="">選択…</option>
            <option>仕事</option><option>家族</option><option>恋愛</option>
            <option>その他人間関係</option><option>健康</option><option>自己肯定感</option><option>その他</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="f-worry-after">ワーク後に自覚した悩み <span class="optional">任意</span></label>
          <select id="f-worry-after" name="ワーク後に自覚した悩み" class="select">
            <option value="">選択…</option>
            <option>仕事</option><option>家族</option><option>恋愛</option>
            <option>その他人間関係</option><option>健康</option><option>自己肯定感</option><option>その他</option>
          </select>
        </div>
      </section>

      <div class="form-divider">
        <div class="form-divider-line"></div>
        <div class="form-divider-label">管理情報</div>
        <div class="form-divider-line"></div>
      </div>

      <section class="form-section">
        <div class="field">
          <label class="label required" for="f-public">公開可否</label>
          <select id="f-public" name="公開可否" class="select" required>
            <option value="要確認" selected>要確認</option>
            <option value="公開可">公開可</option>
            <option value="非公開">非公開</option>
          </select>
        </div>
      </section>

      <div class="form-actions">
        <button type="submit" id="btn-save" class="btn-save">保存する</button>
        <button type="button" class="btn-cancel" onclick="location.href='/'">キャンセル</button>
      </div>
    </form>

    <div id="form-msg" class="form-msg hidden"></div>

  </div>
</div>

<script>
(async () => {
  // Auth check
  const meRes = await fetch('/api/me');
  const { user } = await meRes.json();

  if (!user) {
    document.getElementById('view-login').classList.remove('hidden');
    document.getElementById('btn-google-login').addEventListener('click', () => {
      location.href = '/auth/google';
    });
    return;
  }

  document.getElementById('view-app').classList.remove('hidden');

  // --- File handling ---
  let selectedFiles = [];
  const fileInput = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  const previewRow = document.getElementById('preview-row');
  const btnOcr = document.getElementById('btn-ocr');

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => addFiles(Array.from(fileInput.files)));

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files));
  });

  const UNSUPPORTED_TYPES = ['image/heic', 'image/heif'];
  const MAX_FILE_SIZE = 15 * 1024 * 1024;

  function addFiles(files) {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      if (selectedFiles.length >= 3) break;
      if (UNSUPPORTED_TYPES.includes(f.type.toLowerCase())) {
        setOcrStatus('error', `HEIC/HEIF形式は非対応です。カメラで直接撮影するか、JPEG/PNG形式で保存してから選択してください。`);
        continue;
      }
      if (f.size > MAX_FILE_SIZE) {
        setOcrStatus('error', `「${f.name}」は15MBを超えています（${(f.size/1024/1024).toFixed(1)}MB）。ファイルサイズを小さくしてください。`);
        continue;
      }
      selectedFiles.push(f);
    }
    renderPreviews();
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderPreviews();
  }

  function renderPreviews() {
    previewRow.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const url = URL.createObjectURL(f);
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.innerHTML = `
        <img src="${url}" alt="ワークシート${i+1}">
        <button class="preview-remove" type="button" data-idx="${i}">✕</button>
      `;
      div.querySelector('.preview-remove').addEventListener('click', () => removeFile(i));
      previewRow.appendChild(div);
    });
    btnOcr.disabled = selectedFiles.length === 0;
  }

  // --- OCR ---
  const ocrStatus = document.getElementById('ocr-status');
  let pendingFileIds = [];

  function setOcrStatus(type, msg) {
    ocrStatus.className = 'ocr-status ' + type;
    ocrStatus.textContent = msg;
  }

  const OCR_FIELDS = {
    '夢の内容': 'f-dream-content',
    'ワーク中の気づき': 'f-insight',
    '後日談': 'f-change',
    '大高メモ': 'f-memo',
  };
  const DREAM_TYPE_OPTS = ['悪夢','繰り返し夢','断片','色のみ','音のみ','臭いのみ','味覚のみ','触感のみ','感情のみ','その他'];

  btnOcr.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;

    btnOcr.classList.add('loading');
    btnOcr.disabled = true;
    ocrStatus.className = 'ocr-status';

    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('images', f));

    try {
      const res = await fetch('/api/ocr', { method: 'POST', body: formData });
      const json = await res.json();

      if (!res.ok || !json.ok) {
        setOcrStatus('error', 'エラー: ' + (json.error || 'OCRに失敗しました'));
        return;
      }

      pendingFileIds = json.fileIds || [];

      const data = json.data;
      for (const [key, elId] of Object.entries(OCR_FIELDS)) {
        const el = document.getElementById(elId);
        if (el && data[key]) {
          el.value = data[key];
          el.classList.add('ocr-filled');
          setTimeout(() => el.classList.remove('ocr-filled'), 3000);
        }
      }
      if (data['夢の分類']) {
        const sel = document.getElementById('f-dream-type');
        const matched = DREAM_TYPE_OPTS.find(o => data['夢の分類'].includes(o));
        if (matched) sel.value = matched;
      }

      setOcrStatus('success', `読み取り完了（画像${pendingFileIds.length}枚保存済）。内容を確認・修正してから保存してください。`);
    } catch (err) {
      setOcrStatus('error', '通信エラー: ' + err.message);
    } finally {
      btnOcr.classList.remove('loading');
      btnOcr.disabled = false;
    }
  });

  // --- Form submit ---
  const form = document.getElementById('dream-form');
  const formMsg = document.getElementById('form-msg');
  const btnSave = document.getElementById('btn-save');

  form.addEventListener('submit', async e => {
    e.preventDefault();

    const data = {};
    new FormData(form).forEach((v, k) => { data[k] = v; });
    data['入力元'] = '紙ワークシート転記';
    data['画像ID'] = pendingFileIds.join(',');

    btnSave.disabled = true;
    btnSave.textContent = '保存中…';
    formMsg.classList.add('hidden');

    try {
      const res = await fetch('/api/records', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const json = await res.json();

      if (res.ok && json.ok) {
        formMsg.className = 'form-msg success';
        formMsg.textContent = `保存完了 (${json.id})。一覧に戻ります…`;
        formMsg.classList.remove('hidden');
        setTimeout(() => location.href = '/', 1500);
      } else {
        throw new Error(json.error || '保存に失敗しました');
      }
    } catch (err) {
      formMsg.className = 'form-msg error';
      formMsg.textContent = 'エラー: ' + err.message;
      formMsg.classList.remove('hidden');
      btnSave.disabled = false;
      btnSave.textContent = '保存する';
    }
  });
})();
</script>
</body>
</html>
